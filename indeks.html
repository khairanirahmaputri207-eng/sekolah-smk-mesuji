<!DOCTYPE html>
<html lang="id">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>

      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container{
      width: 800px;
      background: white;
      border-radius: 20px;
      padding: 40px;
      display: flex;
      align-items: center;

    }

    .foto img{
      width: 220px;
      height: 220px;
      border-radius: 50%;
      object-fit: cover;
      border: 5px solid #1f4037;
    }

    .info h1{
      font-size: 40px;
      margin-bottom: 20px;
      color: #222;
    }

    .info p{
      font-size: 22px;
      margin: 15px 0;
      color: #444;
    }

    .info span{
      font-weight: bold;
      display: inline-block;
      width: 170px;
      color: #000;
    }

  </style>
</head>

  <div class="container">
